document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ito Sans\", system-ui, sans-serif;\n    --display:\"Quicksand\", system-ui, sans-serif;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0}\n  body{\n    font-family:var(--font); color:var(--ink); background:var(--bg);\n    -webkit-font-smoothing:antialiased; line-height:1.45;\n    background-image:radial-gradient(1200px 600px at 88% -10%, rgba(25,156,177,.10), transparent 60%),\n                     radial-gradient(900px 500px at -5% 8%, rgba(11,118,186,.07), transparent 55%);\n    min-height:100vh;\n  }\n  .wrap{max-width:1180px; margin:0 auto; padding:26px 26px 80px}\n\n  /* ---------- header ---------- */\n  header.top{display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:24px; flex-wrap:wrap}\n  .brand{display:flex; align-items:center; gap:16px}\n  .brand img{height:46px; width:auto; display:block}\n  .brand .div{width:1px; height:34px; background:var(--border-2)}\n  .brand .pg{display:flex; flex-direction:column}\n  .brand .pg b{font-family:var(--display); font-weight:700; font-size:18px; letter-spacing:.2px; color:var(--ink)}\n  .brand .pg span{font-size:12.5px; color:var(--muted); font-weight:600}\n  .top-actions{display:flex; gap:10px; align-items:center}\n\n  /* ---------- buttons ---------- */\n  .btn{font-family:var(--font); font-weight:700; font-size:14px; border:1px solid transparent;\n    padding:10px 16px; border-radius:999px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;\n    transition:transform .08s ease, background .15s ease, box-shadow .15s ease, border-color .15s; white-space:nowrap}\n  .btn:active{transform:translateY(1px) scale(.99)}\n  .btn svg{width:17px; height:17px}\n  .btn.primary{background:linear-gradient(180deg,var(--teal),var(--teal-d)); color:#fff; box-shadow:0 6px 16px rgba(25,156,177,.28)}\n  .btn.primary:hover{box-shadow:0 8px 22px rgba(25,156,177,.36)}\n  .btn.ghost{background:var(--surface); color:var(--ink-2); border-color:var(--border-2); box-shadow:var(--shadow-sm)}\n  .btn.ghost:hover{border-color:var(--teal); color:var(--teal-d)}\n  .btn.sm{padding:7px 13px; font-size:13px}\n\n  /* ---------- KPIs ---------- */\n  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:16px}\n  .kpi{background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:17px 18px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden}\n  .kpi .lab{display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}\n  .kpi .ic{width:30px; height:30px; border-radius:9px; display:grid; place-items:center; flex:none}\n  .kpi .ic svg{width:16px; height:16px}\n  .kpi .val{font-family:var(--display); font-weight:700; font-size:27px; margin-top:11px; letter-spacing:.2px; line-height:1.1}\n  .kpi .sub{font-size:12.5px; color:var(--muted); margin-top:3px; font-weight:600}\n  .kpi.accent{background:linear-gradient(155deg,#1aa0b5,#0e7fae); border-color:transparent; color:#fff; box-shadow:0 10px 26px rgba(13,110,150,.30)}\n  .kpi.accent .lab,.kpi.accent .sub{color:rgba(255,255,255,.85)}\n  .kpi.accent .ic{background:rgba(255,255,255,.18); color:#fff}\n  .ic.teal{background:var(--green-bg); color:var(--green)}\n  .ic.blue{background:#e2f0f9; color:var(--blue)}\n  .ic.red{background:var(--red-bg); color:var(--red)}\n\n  /* split bar */\n  .splitcard{background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; box-shadow:var(--shadow-sm); margin-bottom:22px}\n  .splitcard .h{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px}\n  .splitcard .h b{font-family:var(--display); font-size:15px; font-weight:700}\n  .splitcard .h .tot{font-size:13px; color:var(--muted); font-weight:700}\n  .bar{height:14px; border-radius:999px; background:var(--surface-2); display:flex; overflow:hidden; border:1px solid var(--border)}\n  .bar i{display:block; height:100%}\n  .bar .a ckground:var(--surface-2); color:var(--ink-2); border-radius:999px; padding:2px 9px; white-space:nowrap}\n  .wincard .mt{gap:6px}\n  .wincard.on .pill{background:#fff}\n  .wincard.over .pill{background:var(--red-bg); color:var(--red)}\n  .wincard .tt{font-family:var(--display); font-weight:700; font-size:12.5px; color:var(--ink-2)}\n  .wincard.empty-w{opacity:.62}\n  .wincard.empty-w .tt{color:var(--faint)}\n\n  .winlist{display:flex; flex-direction:column}\n  .winrow{display:flex; align-items:center; gap:14px; padding:14px 18px; border-bottom:1px solid var(--border)}\n  .winrow:last-child{border-bottom:none}\n  .winrow:hover{background:var(--surface-2)}\n  .winrow .wnum{font-family:var(--display); font-weight:700; white-space:nowrap}\n  .winrow .wdesc{flex:1; min-width:0}\n  .winrow .wdesc .m{font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}\n  .winrow .wval{font-family:var(--display); font-weight:700; font-size:15px; white-space:nowrap}\n  .winrow.is-paid{opacity:.6}\n\n  .quickdates{display:flex; gap:7px; margin-top:8px}\n  .quickdates button{font-family:var(--font); font-size:11.5px; font-weight:700; border:1px solid var(--border-2);\n    background:var(--surface-2); color:var(--ink-2); border-radius:999px; padding:5px 11px; cursor:pointer; transition:.13s}\n  .quickdates button:hover{border-color:var(--teal); color:var(--teal-d); background:#eaf7f9}\n\n  /* ---------- data source / sync pill ---------- */\n  .srcpill{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border-2);\n    border-radius:999px; padding:4px 5px 4px 13px; box-shadow:var(--shadow-sm)}\n  .srcpill .live{display:flex; align-items:center; gap:7px; font-weight:800; font-size:12.5px; color:var(--teal-d)}\n  .srcpill .live .dot{width:8px; height:8px; border-radius:99px; background:var(--green); box-shadow:0 0 0 3px rgba(31,157,107,.18); animation:pulse 2s infinite}\n  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}\n  .s 02Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv><!-- /viewGeral -->\n\n  <div id=\"viewJanelas\" style=\"display:none\">\n    <div class=\"winhead\">\n      <div class=\"t\">\n        <b>Janelas de pagamento<\u002Fb>\n        <p>Os pagamentos saem às <strong>terças<\u002Fstrong> e <strong>quintas-feiras<\u002Fstrong>. Selecione uma janela para ver os pedidos do dia.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"datepick\">\n        <label for=\"winDate\" style=\"font-size:12.5px;font-weight:800;color:var(--ink-2)\">Ir para data<\u002Flabel>\n        <input type=\"date\" id=\"winDate\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"winhero\" id=\"winHero\"><\u002Fdiv>\n    <div class=\"winscroll\" id=\"winScroll\"><\u002Fdiv>\n\n    <div class=\"panel\" style=\"margin-top:10px\">\n      <div class=\"ph\">\n        <h2 id=\"winDetailTitle\">Pedidos da janela<\u002Fh2>\n        <span class=\"tot\" id=\"winDetailTot\" style=\"font-family:var(--display);font-weight:700;color:var(--ink)\"><\u002Fspan>\n      <\u002Fdiv>\n      <div id=\"winDetailHost\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><!-- /viewJanelas -->\n<\u002Fdiv>\n\n<!-- modal -->\n<div class=\"scrim\" id=\"scrim\">\n  <div class=\"modal\" role=\"dialog\" aria-modal=\"true\">\n    <div class=\"mh\">\n      <div><h3 id=\"mTitle\">Novo pedido<\u002Fh3><p id=\"mSub\">Preencha os dados do pedido<\u002Fp><\u002Fdiv>\n      <button class=\"iconbtn\" id=\"closeBtn\" aria-label=\"Fechar\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M18 6L6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <form id=\"form\">\n      <div class=\"grid\">\n        <div class=\"field\">\n          <label>Nº do pedido<\u002Flabel>\n          <input type=\"text\" id=\"f_num\" placeholder=\"ex.: 1042\" required=\"\" autocomplete=\"off\">\n        <\u002Fdiv>\n        <div class=\"field\">\n          <label>Valor total<\u002Flabel>\n          <div class=\"pre\"><span>R$<\u002Fspan><input type=\"text\" inputmode=\"decimal\" id=\"f_valor\" placeholder=\"0,00\" required=\"\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field full\">\n          <label>Descrição <span class=\"opt\">/ fornecedor<\u002Fspan><\u002Flabel>\n          <input type=\"text\" id=\"f_desc\" placeholder=\"ex.: Manutenção elevador — Bloco A\" autocomplete=\"off\">\n        <\u002Fdiv>\n        <div class=\"field full\">\n          <label>Forma de pagamento<\u002Flabel>\n          <div class=\"typetoggle\">\n            <div class=\"typeopt on\" data-tipo=\"avista\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"13\" rx=\"2.5\"><\u002Frect><circle cx=\"12\" cy=\"12.5\" r=\"2.6\"><\u002Fcircle><path d=\"M6 9.5h.01M18 15.5h.01\"><\u002Fpath><\u002Fsvg>\n              <div><b>À vista<\u002Fb><small>Pagamento único<\u002Fsmall><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"typeopt\" data-tipo=\"parcelado\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2.5\"><\u002Frect><path d=\"M3 9h18M8 14h2m4 0h2M8 17h2\"><\u002Fpath><\u002Fsvg>\n              <div><b>Parcelado<\u002Fb><small>Em várias vezes<\u002Fsmall><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\" id=\"parcWrap\" style=\"display:none\">\n          <label>Nº de parcelas<\u002Flabel>\n          <input type=\"number\" id=\"f_parc\" min=\"2\" max=\"48\" step=\"1\" value=\"2\">\n        <\u002Fdiv>\n        <div class=\"field\" id=\"dateWrap\">\n          <label id=\"dateLbl\">Vencimento<\u002Flabel>\n          <input type=\"date\" id=\"f_venc\" required=\"\">\n          <div class=\"quickdates\" id=\"quickDates\">\n            <button type=\"button\" data-wd=\"2\">Próx. terça<\u002Fbutton>\n            <button type=\"button\" data-wd=\"4\">Próx. quinta<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field full\" id=\"parcDatesWrap\" style=\"display:none\">\n          <label>Vencimento de cada parcela<\u002Flabel>\n          <div id=\"parcDates\"><\u002Fdiv>\n          <div class=\"parc-hint\" id=\"parcHint\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field full\" id=\"statusWrap\">\n          <label>Situação<\u002Flabel>\n          <select id=\"f_status\">\n            <option value=\"aberto\">Em aberto<\u002Foption>\n            <option value=\"pago\">Pago<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mfoot\">\n        <button type=\"button\" class=\"btn ghost\" id=\"cancelBtn\">Cancelar<\u002Fbutton>\n        <button type=\"submit\" class=\"btn primary\" id=\"saveBtn\">Salvar pedido<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- connection modal -->\n<div class=\"scrim\" id=\"connScrim\">\n  <div class=\"modal\" role=\"dialog\" aria-modal=\"true\">\n    <div class=\"mh\">\n      <div><h3>Conectar Google Sheets<\u002Fh3><p>A dashboard vai mostrar os pedidos lançados na sua planilha<\u002Fp><\u002Fdiv>\n      <button class=\"iconbtn\" id=\"connClose\" aria-label=\"Fechar\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M18 6L6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"connbody\">\n      <div class=\"conntip\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n        <p>Cole o <b>link do app<\u002Fb> do Google (termina em <code>/exec<\u002Fcode>). Com ele a dashboard <b>lê e grava<\u002Fb> na planilha. O passo a passo para gerar esse link está no <b>guia<\u002Fb>.<\u002Fp>\n      <\u002Fdiv>\n      <ol>\n        <li>Crie a planilha com o nosso modelo e o app do Google (veja o guia).<\u002Fli>\n        <li><b>Implante<\u002Fb> o app como <b>“App da Web”<\u002Fb>, com acesso <b>“Qualquer pessoa”<\u002Fb>.<\u002Fli>\n        <li><b>Copie<\u002Fb> o link gerado (termina em <code>/exec<\u002Fcode>) e cole aqui:<\u002Fli>\n      <\u002Fol>\n      <div class=\"urlrow\">\n        <label for=\"connUrl\">Link do app (ou da planilha publicada)<\u002Flabel>\n        <input type=\"url\" id=\"connUrl\" placeholder=\"https://script.google.com/macros/s/…/exec\" autocomplete=\"off\" spellcheck=\"false\">\n      <\u002Fdiv>\n      <div class=\"connerr\" id=\"connErr\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"><\u002Fpath><path d=\"M12 9v4M12 17h.01\"><\u002Fpath><\u002Fsvg>\n        <p id=\"connErrMsg\"><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mfoot\">\n        <div class=\"left\"><button type=\"button\" class=\"linkbtn\" id=\"disconnectBtn\" style=\"display:none\">Desconectar planilha<\u002Fbutton><\u002Fdiv>\n        <button type=\"button\" class=\"btn ghost\" id=\"connCancel\">Cancelar<\u002Fbutton>\n        <button type=\"button\" class=\"btn primary\" id=\"connSave\">\n          <span id=\"connSaveTxt\">Conectar<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span id=\"toastMsg\"><\u002Fspan><\u002Fdiv>\n\n<script>\nconst KEY = 'myblue_pedidos_v1';\nconst KEY_SRC = 'myblue_sheet_url_v1';\nconst fmtBRL = v => v.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});\nconst fmtBRLshort = v => (v>=1000 ? 'R$ '+(v/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'k' : fmtBRL(v));\nconst todayISO = () => new Date().toISOString().slice(0,10);\nconst parseDate = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };\nconst fmtDate = s => { const d=parseDate(s); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.',''); };\nconst daysUntil = s => Math.round((parseDate(s) - new Date(todayISO()+'T00:00:00'))/86400000);\n\nlet data = load();\nlet editId = null;\nlet formTipo = 'avista';\nlet sortKey = 'venc', sortDir = 1;\nlet fTipo='todos', fStatus='todos', q='';\nlet activeView='geral', selWindow=null;\n\n/* date / window helpers */\nconst WDL=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];\nconst WDS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];\nconst MOS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];\nfunction isoOf(d){ return d.toISOString().slice(0,10); }\nfunction isWindowDay(d){ const w=d.getDay(); return w===2 || w===4; } // Ter/Qui\nfunction nextWindowsISO(n){\n  const out=[]; const d=new Date(todayISO()+'T00:00:00');\n  while(out.length<n){ if(isWindowDay(d)) out.push(isoOf(d)); d.setDate(d.getDate()+1); }\n  return out;\n}\nfunction nextWindowISO(){ return nextWindowsISO(1)[0]; }\nfunction nextWeekdayISO(target){\n  const d=new Date(todayISO()+'T00:00:00');\n  for(let i=0;i<21;i++){ if(d.getDay()===target) return isoOf(d); d.setDate(d.getDate()+1); }\n  return todayISO();\n}\nfunction fmtFull(iso){ const d=parseDate(iso); return `${WDL[d.getDay()]}, ${d.getDate()} ${MOS[d.getMonth()]}`; }\nfunction countdownTxt(iso){\n  const n=daysUntil(iso);\n  if(n<0) return `${Math.abs(n)} dia(s) atrás`;\n  if(n===0) return 'É hoje';\n  if(n===1) return 'Amanhã';\n  return `Em ${n} dias`;\n}\n\nfunction load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ return []; } }\nfunction save(){ localStorage.setItem(KEY, JSON.stringify(data)); }\n\n/* status: pago | vencido | aberto (computed for 'aberto' records past due) */\nfunction statusOf(p){\n  if(p.status === 'pago') return 'pago';\n  if(daysUntil(p.venc) < 0) return 'vencido';\n  return 'aberto';\n}\n\n/* ---------- janelas de pagamento ---------- */\nfunction ordersOn(iso){ return data.filter(p=>p.venc===iso); }\nfunction overdueOrders(){ return data.filter(p=>statusOf(p)==='vencido').sort((a,b)=>parseDate(a.venc)-parseDate(b.venc)); }\n\nfunction renderJanelas(){\n  const wins = nextWindowsISO(8);\n  const over = overdueOrders();\n  // default selection\n  if(!selWindow || (selWindow!=='atrasados' && !wins.includes(selWindow) && ordersOn(selWindow).length===0 && !document.getElementById('winDate').value)){\n    selWindow = over.length ? 'atrasados' : wins[0];\n  }\n\n  // hero = próxima janela (sempre a próxima Ter/Qui)\n  const nextISO = wins[0];\n  const nextOrders = ordersOn(nextISO).filter(p=>p.status!=='pago');\n  const nextTot = nextOrders.reduce((s,p)=>s+p.valor,0);\n  document.getElementById('winHero').innerHTML = `\n    <div>\n      <div class=\"lab\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"/><path d=\"M3 10h18M8 2v4M16 2v4\"/><\u002Fsvg>Próxima janela de pagamento<\u002Fdiv>\n      <div class=\"big\">${fmtFull(nextISO)}<\u002Fdiv>\n      <div class=\"cd\">${countdownTxt(nextISO)}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stats\">\n      <div class=\"stat\"><div class=\"n\">${nextOrders.length}<\u002Fdiv><div class=\"l\">pedidos<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\">${fmtBRL(nextTot)}<\u002Fdiv><div class=\"l\">a pagar<\u002Fdiv><\u002Fdiv>\n      ${over.length?`<div class=\"stat\"><div class=\"n\">${over.length}<\u002Fdiv><div class=\"l\">atrasados<\u002Fdiv><\u002Fdiv>`:''}\n    <\u002Fdiv>`;\n\n  // window cards (atrasados first, then upcoming)\n  let cards='';\n  if(over.length){\n    const t=over.reduce((s,p)=>s+p.valor,0);\n    cards += `<div class=\"wincard over ${selWindow==='atrasados'?'on':''}\" data-win=\"atrasados\">\n      <div class=\"wd\">⚠ Atrasados<\u002Fdiv>\n      <div class=\"dm\">${over.length} pds<\u002Fdiv>\n      <div class=\"mt\"><span class=\"tt\">${fmtBRL(t)}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>`;\n  }\n  for(const iso of wins){\n    const d=parseDate(iso);\n    const ords=ordersOn(iso).filter(p=>p.status!=='pago');\n    const t=ords.reduce((s,p)=>s+p.valor,0);\n    cards += `<div class=\"wincard ${selWindow===iso?'on':''} ${ords.length?'':'empty-w'}\" data-win=\"${iso}\">\n      <div class=\"wd\">${WDS[d.getDay()]}${daysUntil(iso)===0?' · hoje':''}<\u002Fdiv>\n      <div class=\"dm\">${d.getDate()} ${MOS[d.getMonth()]}<\u002Fdiv>\n      <div class=\"mt\"><span class=\"pill\">${ords.length} pd<\u002Fspan><span class=\"tt\">${ords.length?fmtBRLshort(t):'—'}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>`;\n  }\n  document.getElementById('winScroll').innerHTML = cards;\n\n  renderWinDetail();\n\n  // tab overdue badge\n  const badge=document.getElementById('tabOverdue');\n  if(over.length){ badge.style.display=''; badge.textContent=over.length; } else badge.style.display='none';\n}\n\nfunction renderWinDetail(){\n  const host=document.getElementById('winDetailHost');\n  const titleEl=document.getElementById('winDetailTitle');\n  const totEl=document.getElementById('winDetailTot');\n  let orders, title;\n  if(selWindow==='atrasados'){ orders=overdueOrders(); title='Pedidos atrasados'; }\n  else { orders=ordersOn(selWindow).slice().sort((a,b)=>(a.status==='pago')-(b.status==='pago')); title='Pedidos de '+fmtFull(selWindow); }\n  titleEl.textContent=title;\n  const openOrds=orders.filter(p=>p.status!=='pago');\n  const tot=openOrds.reduce((s,p)=>s+p.valor,0);\n  totEl.textContent = orders.length ? `${openOrds.length} a pagar · ${fmtBRL(tot)}` : '';\n\n  if(!orders.length){\n    host.innerHTML = `<div class=\"empty\">\n      <div class=\"e-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"/><path d=\"M3 10h18M8 2v4M16 2v4\"/><path d=\"M9 15l2 2 4-4\"/><\u002Fsvg><\u002Fdiv>\n      <h3>Nenhum pedido nesta janela<\u002Fh3>\n      <p>Não há pedidos com vencimento neste dia. Selecione outra data acima.<\u002Fp><\u002Fdiv>`;\n    return;\n  }\n  let html='<div class=\"winlist\">';\n  for(const p of orders){\n    const st=statusOf(p);\n    const forma = formaChip(p);\n    html += `<div class=\"winrow ${p.status==='pago'?'is-paid':''}\" data-id=\"${p.id}\">\n      <span class=\"wnum\">#${escapeHtml(p.num)}<\u002Fspan>\n      <span class=\"wdesc\"><div class=\"m\">${p.desc?escapeHtml(p.desc):'<span style=\"color:var(--faint)\">Sem descrição<\u002Fspan>'}<\u002Fdiv><\u002Fspan>\n      ${forma}\n      <span class=\"st ${st}\"><span class=\"d\"><\u002Fspan>${STLABEL[st]}<\u002Fspan>\n      <span class=\"wval\">${fmtBRL(p.valor)}<\u002Fspan>\n      <button class=\"iconbtn pay\" data-act=\"pay\" title=\"${p.status==='pago'?'Reabrir':'Marcar como pago'}\">\n        ${p.status==='pago'\n          ? '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 8\"/><path d=\"M21 3v5h-5\"/><\u002Fsvg>'\n          : '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg>'}\n      <\u002Fbutton>\n    <\u002Fdiv>`;\n  }\n  html+='<\u002Fdiv>';\n  host.innerHTML=html;\n}\n\n/* ---------- KPIs ---------- */\nfunction renderKPIs(){\n  const open = data.filter(p=>p.status!=='pago');\n  const totalOpen = open.reduce((s,p)=>s+p.valor,0);\n  const av = open.filter(p=>p.tipo==='avista').reduce((s,p)=>s+p.valor,0);\n  const pa = open.filter(p=>p.tipo==='parcelado').reduce((s,p)=>s+p.valor,0);\n  const venc = open.filter(p=>statusOf(p)==='vencido');\n  const vencTot = venc.reduce((s,p)=>s+p.valor,0);\n  const pagoTot = data.filter(p=>p.status==='pago').reduce((s,p)=>s+p.valor,0);\n  const soon = open.filter(p=>{const d=daysUntil(p.venc); return d>=0 && d<=7;});\n  const soonTot = soon.reduce((s,p)=>s+p.valor,0);\n\n  const ICO = {\n    open:'<path d=\"M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"/>',\n    soon:'<circle cx=\"12\" cy=\"13\" r=\"8\"/><path d=\"M12 9v4l2 2M9 2h6\"/>',\n    late:'<path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z\"/><path d=\"M12 9v4M12 17h.01\"/>',\n    paid:'<path d=\"M22 11.1V12a10 10 0 1 1-5.9-9.1\"/><path d=\"M22 4 12 14.01l-3-3\"/>'\n  };\n  const kpis = [\n    {cls:'accent', icCls:'', lab:'Em aberto', val:fmtBRL(totalOpen), sub:`${open.length} pedido(s) a receber`, ic:ICO.open},\n    {cls:'', icCls:'blue', lab:'Vence em 7 dias', val:fmtBRL(soonTot), sub:`${soon.length} pedido(s) próximo(s)`, ic:ICO.soon},\n    {cls:'', icCls:'red', lab:'Vencidos', val:fmtBRL(vencTot), sub:`${venc.length} pedido(s) em atraso`, ic:ICO.late},\n    {cls:'', icCls:'teal', lab:'Pagos', val:fmtBRL(pagoTot), sub:`${data.filter(p=>p.status==='pago').length} quitado(s)`, ic:ICO.paid},\n  ];\n  document.getElementById('kpis').innerHTML = kpis.map(k=>`\n    <div class=\"kpi ${k.cls}\">\n      <div class=\"lab\"><span class=\"ic ${k.icCls}\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">${k.ic}<\u002Fsvg><\u002Fspan>${k.lab}<\u002Fdiv>\n      <div class=\"val\">${k.val}<\u002Fdiv>\n      <div class=\"sub\">${k.sub}<\u002Fdiv>\n    <\u002Fdiv>`).join('');\n\n  // split bar (open only)\n  const tot = av+pa;\n  document.getElementById('barAv').style.width = (tot? av/tot*100 : 0)+'%';\n  document.getElementById('barPa').style.width = (tot? pa/tot*100 : 0)+'%';\n  document.getElementById('legAv').textContent = fmtBRL(av);\n  document.getElementById('legPa').textContent = fmtBRL(pa);\n  document.getElementById('splitTot').textContent = tot? 'Total em aberto · '+fmtBRL(tot) : 'Nenhum valor em aberto';\n}\n\n/* ---------- table ---------- */\nfunction filtered(){\n  let rows = data.filter(p=>{\n    if(fTipo!=='todos' && p.tipo!==fTipo) return false;\n    if(fStatus!=='todos' && statusOf(p)!==fStatus) return false;\n    if(q && !((p.num+' '+(p.desc||'')).toLowerCase().includes(q.toLowerCase()))) return false;\n    return true;\n  });\n  rows.sort((a,b)=>{\n    let r=0;\n    if(sortKey==='venc') r = parseDate(a.venc)-parseDate(b.venc);\n    else if(sortKey==='valor') r = a.valor-b.valor;\n    else if(sortKey==='num') r = String(a.num).localeCompare(String(b.num),'pt',{numeric:true});\n    else if(sortKey==='status') r = statusOf(a).localeCompare(statusOf(b));\n    return r*sortDir;\n  });\n  return rows;\n}\n\nconst STLABEL = {aberto:'Em aberto', vencido:'Vencido', pago:'Pago'};\n\nfunction renderTable(){\n  const rows = filtered();\n  const host = document.getElementById('tableHost');\n  const foot = document.getElementById('tfoot');\n\n  if(data.length===0){\n    foot.style.display='none';\n    host.innerHTML = emptyState(true);\n    return;\n  }\n  if(rows.length===0){\n    foot.style.display='none';\n    host.innerHTML = emptyState(false);\n    return;\n  }\n\n  const th = (k,label,extra='')=>`<th class=\"${extra} ${sortKey===k?'sorted':''}\" data-sort=\"${k}\">${label}<span class=\"ar\">${sortDir>0?'▲':'▼'}<\u002Fspan><\u002Fth>`;\n  let html = `<table><thead><tr>\n    ${th('num','Pedido')}\n    <th class=\"colhide\">Descrição<\u002Fth>\n    ${th('valor','Valor','r')}\n    <th>Forma<\u002Fth>\n    ${th('venc','Vencimento')}\n    ${th('status','Status')}\n    <th class=\"r actcol\">Ações<\u002Fth>\n  <\u002Ftr><\u002Fthead><tbody>`;\n\n  for(const p of rows){\n    const st = statusOf(p);\n    const d = daysUntil(p.venc);\n    let dueExtra = '';\n    if(st==='vencido') dueExtra = `<div class=\"due-late\">${Math.abs(d)}d em atraso<\u002Fdiv>`;\n    else if(st==='aberto' && d<=7) dueExtra = `<div class=\"due-soon\">${d===0?'vence hoje':'em '+d+'d'}<\u002Fdiv>`;\n    const forma = formaChip(p);\n    html += `<tr data-id=\"${p.id}\">\n      <td class=\"num\">#${escapeHtml(p.num)}<\u002Ftd>\n      <td class=\"colhide\"><div class=\"desc-main\">${p.desc?escapeHtml(p.desc):'<span style=\"color:var(--faint)\">—<\u002Fspan>'}<\u002Fdiv><\u002Ftd>\n      <td class=\"val\">${fmtBRL(p.valor)}<\u002Ftd>\n      <td>${forma}<\u002Ftd>\n      <td><div style=\"font-weight:700\">${fmtDate(p.venc)}<\u002Fdiv>${dueExtra}<\u002Ftd>\n      <td><span class=\"st ${st}\"><span class=\"d\"><\u002Fspan>${STLABEL[st]}<\u002Fspan><\u002Ftd>\n      <td class=\"actcol\">\n        <div class=\"rowact\">\n          <button class=\"iconbtn pay\" data-act=\"pay\" title=\"${p.status==='pago'?'Marcar em aberto':'Marcar como pago'}\">\n            ${p.status==='pago'\n              ? '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 8\"/><path d=\"M21 3v5h-5\"/><\u002Fsvg>'\n              : '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg>'}\n          <\u002Fbutton>\n          <button class=\"iconbtn\" data-act=\"edit\" title=\"Editar\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"/><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z\"/><\u002Fsvg>\n          <\u002Fbutton>\n          <button class=\"iconbtn del\" data-act=\"del\" title=\"Excluir\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6\"/><path d=\"M10 11v6M14 11v6\"/><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Ftd>\n    <\u002Ftr>`;\n  }\n  html += '<\u002Ftbody><\u002Ftable>';\n  host.innerHTML = html;\n\n  const dispTotal = rows.reduce((s,p)=>s+p.valor,0);\n  foot.style.display='flex';\n  document.getElementById('countTxt').textContent = `${rows.length} de ${data.length} pedido(s)`;\n  document.getElementById('footTotal').textContent = fmtBRL(dispTotal);\n}\n\nfunction emptyState(first){\n  if(first){\n    if(typeof sheetMode!=='undefined' && sheetMode) return `<div class=\"empty\">\n      <div class=\"e-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"/><path d=\"M3 9h18M8 14h8M8 17h5\"/><\u002Fsvg><\u002Fdiv>\n      <h3>Planilha conectada, sem pedidos<\u002Fh3>\n      <p>${canWrite ? 'Clique em “Novo pedido” para adicionar — ele vai direto para a planilha.' : 'Lance os pedidos na sua planilha do Google Sheets e clique em atualizar — eles aparecem aqui.'}<\u002Fp>\n      ${canWrite ? '<button class=\"btn primary\" onclick=\"openModal()\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"/><\u002Fsvg>Novo pedido<\u002Fbutton>':''}<\u002Fdiv>`;\n    return `<div class=\"empty\">\n    <div class=\"e-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><path d=\"M14 2v6h6M9 13h6M9 17h6\"/><\u002Fsvg><\u002Fdiv>\n    <h3>Nenhum pedido ainda<\u002Fh3>\n    <p>Comece adicionando seu primeiro pedido — número, valor, vencimento e forma de pagamento.<\u002Fp>\n    <button class=\"btn primary\" onclick=\"openModal()\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"/><\u002Fsvg>Adicionar pedido<\u002Fbutton>\n  <\u002Fdiv>`;\n  }\n  return `<div class=\"empty\">\n    <div class=\"e-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"/><path d=\"M21 21l-4.3-4.3\"/><\u002Fsvg><\u002Fdiv>\n    <h3>Nada encontrado<\u002Fh3>\n    <p>Nenhum pedido corresponde aos filtros aplicados.<\u002Fp>\n  <\u002Fdiv>`;\n}\n\nfunction escapeHtml(s){ return String(s).replace(/[&<>\"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c])); }\n\nfunction formaChip(p){\n  if(p.tipo==='avista') return `<span class=\"chip av\"><span class=\"d\" style=\"background:var(--teal)\"><\u002Fspan>À vista<\u002Fspan>`;\n  if(p.parcelaNum) return `<span class=\"chip pa\"><span class=\"d\" style=\"background:var(--blue)\"><\u002Fspan>Parcela ${p.parcelaNum}/${p.parcelas} · ${fmtBRL(p.valor)}<\u002Fspan>`;\n  return `<span class=\"chip pa\"><span class=\"d\" style=\"background:var(--blue)\"><\u002Fspan>${p.parcelas}x · ${fmtBRL(p.valor/p.parcelas)}<\u002Fspan>`;\n}\n\n/* ---------- modal & form ---------- */\nfunction openModal(p){\n  editId = p? p.id : null;\n  document.getElementById('mTitle').textContent = p? 'Editar pedido' : 'Novo pedido';\n  document.getElementById('mSub').textContent = p? `Pedido #${p.num}` : 'Preencha os dados do pedido';\n  document.getElementById('saveBtn').textContent = p? 'Salvar alterações' : 'Salvar pedido';\n  document.getElementById('f_num').value = p? p.num : '';\n  document.getElementById('f_desc').value = p? (p.desc||'') : '';\n  document.getElementById('f_valor').value = p? p.valor.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '';\n  document.getElementById('f_venc').value = p? p.venc : nextWindowISO();\n  document.getElementById('f_parc').value = p && p.parcelas? p.parcelas : 2;\n  document.getElementById('f_status').value = p? p.status : 'aberto';\n  setTipo(p? p.tipo : 'avista');\n  document.getElementById('scrim').classList.add('open');\n  setTimeout(()=>document.getElementById('f_num').focus(), 60);\n}\nfunction closeModal(){ document.getElementById('scrim').classList.remove('open'); }\n\nfunction setTipo(t){\n  formTipo = t;\n  document.querySelectorAll('.typeopt').forEach(el=>el.classList.toggle('on', el.dataset.tipo===t));\n  const parc = t==='parcelado';\n  document.getElementById('parcWrap').style.display = parc? 'flex' : 'none';\n  document.getElementById('dateWrap').style.display = parc? 'none' : 'flex';\n  document.getElementById('parcDatesWrap').style.display = parc? 'block' : 'none';\n  if(parc) renderParcDates();\n}\n\nfunction addMonthsISO(iso, n){\n  const d = parseDate(iso); const day = d.getDate();\n  d.setMonth(d.getMonth()+n);\n  if(d.getDate() < day) d.setDate(0); // ajusta fim de mês\n  return isoOf(d);\n}\nfunction renderParcDates(mode){\n  const n = Math.max(2, Math.min(48, parseInt(document.getElementById('f_parc').value)||2));\n  const host = document.getElementById('parcDates');\n  const prev = {};\n  host.querySelectorAll('input[data-i]').forEach(inp=>prev[inp.dataset.i]=inp.value);\n  let base = prev['1'] || document.getElementById('f_venc').value || nextWindowISO();\n  let html='';\n  for(let i=1;i<=n;i++){\n    let val;\n    if(mode==='rebase') val = (i===1? base : addMonthsISO(base, i-1));   // recalcula a partir da 1ª\n    else val = prev[i] || (i===1? base : addMonthsISO(base, i-1));        // preserva o que já foi digitado\n    html += `<div class=\"parc-row\"><span class=\"lbl\">Parcela ${i}/${n}<\u002Fspan><input type=\"date\" data-i=\"${i}\" value=\"${val}\"><\u002Fdiv>`;\n  }\n  host.innerHTML = html;\n  updateParcHint();\n}\nfunction updateParcHint(){\n  const n = Math.max(2, parseInt(document.getElementById('f_parc').value)||2);\n  const total = parseMoney(document.getElementById('f_valor').value);\n  const hint = document.getElementById('parcHint');\n  if(isNaN(total) || total<=0){ hint.innerHTML = `Informe o valor total para calcular cada parcela.`; return; }\n  const each = Math.round(total/n*100)/100;\n  hint.innerHTML = `${n}× de <b>${fmtBRL(each)}<\u002Fb> · total <b>${fmtBRL(total)}<\u002Fb>`;\n}\n\nfunction parseMoney(s){\n  if(!s) return NaN;\n  s = String(s).trim().replace(/\\s/g,'').replace(/r\\$/i,'');\n  // pt-BR: 1.234,56  -> remove thousands dots, comma to dot\n  if(s.includes(',')) s = s.replace(/\\./g,'').replace(',', '.');\n  return parseFloat(s);\n}\n\ndocument.getElementById('form').addEventListener('submit', e=>{\n  e.preventDefault();\n  const num = document.getElementById('f_num').value.trim();\n  const valor = parseMoney(document.getElementById('f_valor').value);\n  if(!num || isNaN(valor) || valor<=0){ shake(); return; }\n  const desc = document.getElementById('f_desc').value.trim();\n  const statusVal = document.getElementById('f_status').value;\n  const baseId = 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);\n\n  let recs;\n  if(formTipo==='parcelado'){\n    const n = Math.max(2, Math.min(48, parseInt(document.getElementById('f_parc').value)||2));\n    const dates = [...document.querySelectorAll('#parcDates input[data-i]')].map(i=>i.value);\n    if(dates.length<n || dates.some(d=>!d)){ shake(); return; }\n    const each = Math.round(valor/n*100)/100;\n    recs = [];\n    for(let i=1;i<=n;i++){\n      const v = (i===n) ? Math.round((valor - each*(n-1))*100)/100 : each;\n      recs.push({ id:baseId+'-'+i, num, desc, valor:v, venc:dates[i-1], tipo:'parcelado',\n        parcelas:n, parcelaNum:i, status:statusVal, created:Date.now()+i });\n    }\n  } else {\n    const venc = document.getElementById('f_venc').value;\n    if(!venc){ shake(); return; }\n    recs = [{ id:baseId, num, desc, valor, venc, tipo:'avista', parcelas:null, parcelaNum:null, status:statusVal, created:Date.now() }];\n  }\n\n  if(!editId && sheetMode && canWrite){\n    closeModal();\n    toast(recs.length>1 ? 'Salvando parcelas…' : 'Salvando na planilha…');\n    recs.forEach(r=>data.unshift(r)); renderAll();          // mostra na hora (otimista)\n    pushToSheet(recs)\n      .then(()=>{ toast(recs.length>1 ? 'Parcelas enviadas à planilha' : 'Pedido enviado à planilha'); setTimeout(()=>syncSheet(), 1900); })\n      .catch(()=>toast('Não consegui gravar na planilha'));\n    return;\n  }\n  if(editId){\n    const rec=recs[0]; rec.id=editId; rec.created=(data.find(x=>x.id===editId)||{}).created||Date.now();\n    data = data.map(x=>x.id===editId? rec : x); toast('Pedido atualizado');\n  } else {\n    recs.forEach(r=>data.unshift(r)); toast(recs.length>1 ? 'Parcelas adicionadas' : 'Pedido adicionado');\n  }\n  save(); closeModal(); renderAll();\n});\n\nfunction shake(){\n  const m=document.querySelector('.modal');\n  m.animate([{transform:'translateX(0)'},{transform:'translateX(-7px)'},{transform:'translateX(7px)'},{transform:'translateX(0)'}],{duration:240});\n}\n\n/* ---------- row actions ---------- */\ndocument.getElementById('tableHost').addEventListener('click', e=>{\n  const btn = e.target.closest('[data-act]'); const head = e.target.closest('[data-sort]');\n  if(head){ const k=head.dataset.sort; if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=1;} renderTable(); return; }\n  if(!btn) return;\n  const id = btn.closest('tr').dataset.id;\n  const p = data.find(x=>x.id===id); if(!p) return;\n  if(btn.dataset.act==='pay'){ togglePaid(p); }\n  else if(btn.dataset.act==='edit'){ openModal(p); }\n  else if(btn.dataset.act==='del'){\n    if(confirm(`Excluir o pedido #${p.num}?`)){ data=data.filter(x=>x.id!==id); save(); renderAll(); toast('Pedido excluído'); }\n  }\n});\n\n/* marca pago/reabre — grava na planilha no modo app */\nfunction togglePaid(p){\n  const novo = p.status==='pago' ? 'aberto' : 'pago';\n  p.status = novo; renderAll();\n  if(sheetMode && canWrite){\n    toast(novo==='pago' ? 'Marcando como pago…' : 'Reabrindo…');\n    postSheet({ action:'setStatus', row:p.sheetRow, num:p.num, venc:toBR(p.venc),\n      status: novo==='pago' ? 'Pago':'Em aberto' })\n      .then(()=>{ setTimeout(()=>syncSheet(), 1500); })\n      .catch(()=>toast('Não consegui atualizar na planilha'));\n  } else {\n    save(); toast(novo==='pago' ? 'Marcado como pago' : 'Reaberto');\n  }\n}\n\n/* ---------- filters ---------- */\nfunction bindSeg(id, cb){\n  document.getElementById(id).addEventListener('click', e=>{\n    const b=e.target.closest('button'); if(!b) return;\n    [...e.currentTarget.children].forEach(x=>x.classList.toggle('on', x===b));\n    cb(b.dataset.v);\n  });\n}\nbindSeg('filterTipo', v=>{ fTipo=v; renderTable(); });\nbindSeg('filterStatus', v=>{ fStatus=v; renderTable(); });\ndocument.getElementById('search').addEventListener('input', e=>{ q=e.target.value; renderTable(); });\n\n/* ---------- misc ---------- */\nlet toastT;\nfunction toast(msg){ const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }\n\ndocument.getElementById('newBtn').onclick = ()=>openModal();\ndocument.getElementById('closeBtn').onclick = closeModal;\ndocument.getElementById('cancelBtn').onclick = closeModal;\ndocument.getElementById('scrim').addEventListener('click', e=>{ if(e.target.id==='scrim') closeModal(); });\ndocument.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); closeConn(); } });\ndocument.querySelectorAll('.typeopt').forEach(el=>el.onclick=()=>setTipo(el.dataset.tipo));\ndocument.getElementById('quickDates').addEventListener('click', e=>{\n  const b=e.target.closest('button'); if(!b) return;\n  document.getElementById('f_venc').value = nextWeekdayISO(+b.dataset.wd);\n});\ndocument.getElementById('f_parc').addEventListener('input', ()=>renderParcDates());\ndocument.getElementById('f_valor').addEventListener('input', ()=>{ if(formTipo==='parcelado') updateParcHint(); });\ndocument.getElementById('parcDates').addEventListener('input', e=>{ if(e.target.dataset.i==='1') renderParcDates('rebase'); });\n\n/* ---------- tabs & janelas ---------- */\nfunction setView(v){\n  activeView=v;\n  document.getElementById('viewGeral').style.display = v==='geral'?'':'none';\n  document.getElementById('viewJanelas').style.display = v==='janelas'?'':'none';\n  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.view===v));\n  if(v==='janelas') renderJanelas();\n}\ndocument.getElementById('tabs').addEventListener('click', e=>{\n  const t=e.target.closest('.tab'); if(t) setView(t.dataset.view);\n});\ndocument.getElementById('winScroll').addEventListener('click', e=>{\n  const c=e.target.closest('.wincard'); if(!c) return;\n  selWindow=c.dataset.win;\n  if(selWindow!=='atrasados') document.getElementById('winDate').value=selWindow;\n  renderJanelas();\n});\ndocument.getElementById('winDate').addEventListener('change', e=>{\n  if(e.target.value){ selWindow=e.target.value; renderJanelas(); }\n});\ndocument.getElementById('viewJanelas').addEventListener('click', e=>{\n  const btn=e.target.closest('[data-act]'); if(!btn) return;\n  const id=btn.closest('[data-id]').dataset.id;\n  const p=data.find(x=>x.id===id); if(!p) return;\n  if(btn.dataset.act==='pay'){ togglePaid(p); }\n});\n\ndocument.getElementById('exportBtn').onclick = ()=>{\n  if(!data.length){ toast('Nada para exportar'); return; }\n  const head = ['Pedido','Descricao','Valor','Forma','Parcelas','Vencimento','Status'];\n  const lines = [head.join(';')];\n  for(const p of data){\n    lines.push([p.num, '\"'+(p.desc||'').replace(/\"/g,'\"\"')+'\"', p.valor.toFixed(2).replace('.',','),\n      p.tipo==='avista'?'A vista':'Parcelado', p.parcelas||'', p.venc, STLABEL[statusOf(p)]].join(';'));\n  }\n  const blob = new Blob(['\\ufeff'+lines.join('\\n')], {type:'text/csv;charset=utf-8'});\n  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);\n  a.download='pedidos-myblue.csv'; a.click(); toast('CSV exportado');\n};\n\nfunction renderAll(){ renderKPIs(); renderTable(); if(activeView==='janelas') renderJanelas(); }\n\n/* ============ Google Sheets (modo híbrido: lê e grava) ============ */\n/* >>> Cole aqui o link do APP do Google (termina em /exec) para a dashboard\n   SEMPRE puxar e gravar nesta planilha, em qualquer computador/celular.\n   Deixe \"\" para configurar pelo botão \"Conectar planilha\". <<< */\nconst SHEET_URL_BUILTIN = \"https://script.google.com/macros/s/AKfycbyiHFyv7xZeYAGXfrLZErF8nBt69mw6kKL0_fCKLaluPKPMy44V1cDjZIsBT192UYchHA/exec\";\n\nlet sheetUrl = SHEET_URL_BUILTIN || localStorage.getItem(KEY_SRC) || null;\nlet sheetMode = !!sheetUrl;\nlet canWrite = false; // true quando conectado a um app /exec (permite adicionar)\n\nfunction isAppsScript(url){ return /script\\.google\\.com\\/macros\\/.*\\/exec/.test(url||''); }\n\nfunction normalizeSheetUrl(url){\n  url = (url||'').trim();\n  if(!url) return null;\n  if(isAppsScript(url)) return url;\n  if(url.includes('/pub')){\n    if(!/output=csv/.test(url)) url += (url.includes('?')?'&':'?') + 'output=csv';\n    return url;\n  }\n  if(url.includes('gviz/tq')) return url;\n  const m = url.match(/\\/spreadsheets\\/d\\/([a-zA-Z0-9-_]+)/);\n  if(m){\n    let gid='0'; const g = url.match(/[#&?]gid=(\\d+)/); if(g) gid=g[1];\n    return `https://docs.google.com/spreadsheets/d/${m[1]}/gviz/tq?tqx=out:csv&gid=${gid}`;\n  }\n  return url;\n}\n\nfunction parseCSV(text){\n  const rows=[]; let row=[], cur='', inQ=false;\n  for(let i=0;i<text.length;i++){\n    const c=text[i];\n    if(inQ){\n      if(c==='\"'){ if(text[i+1]==='\"'){ cur+='\"'; i++; } else inQ=false; }\n      else cur+=c;\n    } else {\n      if(c==='\"') inQ=true;\n      else if(c===','){ row.push(cur); cur=''; }\n      else if(c==='\\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }\n      else if(c!=='\\r') cur+=c;\n    }\n  }\n  if(cur!=='' || row.length){ row.push(cur); rows.push(row); }\n  return rows.filter(r=>r.some(x=>(x||'').trim()!==''));\n}\n\nconst noAcc = s => (s||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'');\nfunction mapHeaders(h){\n  const idx={};\n  h.forEach((col,i)=>{ const k=noAcc(col);\n    if(k.includes('pedido')||k==='n' || k.includes('numero')) idx.num=i;\n    else if(k.includes('descri')||k.includes('fornecedor')) idx.desc=i;\n    else if(k.includes('valor')||k.includes('preco')) idx.valor=i;\n    else if(k.includes('parcela')) idx.parcelas=i;\n    else if(k.includes('forma')||k.includes('pagamento')) idx.forma=i;\n    else if(k.includes('vencimento')||k.includes('venc')||k.includes('data')) idx.venc=i;\n    else if(k.includes('status')||k.includes('situa')) idx.status=i;\n  });\n  return idx;\n}\n\nfunction parseSheetDate(s){\n  s=(s||'').trim(); if(!s) return null; let m;\n  if(m=s.match(/^(\\d{4})-(\\d{1,2})-(\\d{1,2})/)) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;\n  if(m=s.match(/^(\\d{1,2})[\\/.-](\\d{1,2})[\\/.-](\\d{2,4})/)){ let y=m[3]; if(y.length===2) y='20'+y; return `${y}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`; }\n  const d=new Date(s); if(!isNaN(d)) return isoOf(d);\n  return null;\n}\n\nfunction rowsToData(rows){\n  if(!rows.length) return [];\n  const idx=mapHeaders(rows[0]);\n  if(idx.num===undefined && idx.valor===undefined && idx.venc===undefined) throw new Error('cabecalho');\n  const out=[];\n  for(let r=1;r<rows.length;r++){\n    const row=rows[r];\n    const get=k=> idx[k]!==undefined ? (row[idx[k]]||'').trim() : '';\n    const num=get('num'), valorRaw=get('valor'), vencRaw=get('venc');\n    if(!num && !valorRaw && !vencRaw) continue;\n    const venc=parseSheetDate(vencRaw); if(!venc) continue;\n    const valor=parseMoney(valorRaw)||0;\n    const tipo = noAcc(get('forma')).includes('parcel') ? 'parcelado':'avista';\n    const status = noAcc(get('status')).includes('pago') ? 'pago':'aberto';\n    const parcCell = get('parcelas');\n    let parcelaNum=null, parcelasTotal=null;\n    const mm = parcCell.match(/(\\d+)\\s*\\/\\s*(\\d+)/);     // formato \"2/6\"\n    if(mm){ parcelaNum=+mm[1]; parcelasTotal=+mm[2]; }\n    else { const n=parseInt(parcCell)||0; if(n>1) parcelasTotal=n; }\n    out.push({ id:'sheet-'+r, sheetRow:r+1, num:num||('?'+r), desc:get('desc'), valor, venc, tipo,\n      parcelas: tipo==='parcelado' ? (parcelasTotal||2) : null, parcelaNum, status, created:r });\n  }\n  return out;\n}\n\n/* leitura via JSONP (Apps Script) — evita bloqueio de CORS */\nfunction loadViaJsonp(url){\n  return new Promise((resolve,reject)=>{\n    const cb='mbcb_'+Math.random().toString(36).slice(2);\n    const s=document.createElement('script');\n    let done=false;\n    const t=setTimeout(()=>{ if(!done){ cleanup(); reject(new Error('timeout')); } }, 15000);\n    function cleanup(){ done=true; clearTimeout(t); try{ delete window[cb]; }catch(e){} s.remove(); }\n    window[cb]=rows=>{ cleanup(); resolve(rows); };\n    s.onerror=()=>{ cleanup(); reject(new Error('script')); };\n    s.src=url + (url.includes('?')?'&':'?') + 'callback='+cb+'&t='+Date.now();\n    document.body.appendChild(s);\n  });\n}\n\nasync function fetchRows(url){\n  const u=normalizeSheetUrl(url);\n  if(isAppsScript(u)){\n    const rows=await loadViaJsonp(u);            // 2D array (com cabeçalho)\n    if(!Array.isArray(rows)) throw new Error('app');\n    return rowsToData(rows);\n  }\n  const res=await fetch(u,{cache:'no-store'});\n  if(!res.ok) throw new Error('http '+res.status);\n  const text=await res.text();\n  if(/^\\s*<(!doctype|html)/i.test(text)) throw new Error('nao publicada');\n  return rowsToData(parseCSV(text));\n}\n\n/* gravação na planilha (Apps Script) */\nfunction toBR(iso){ const d=parseDate(iso); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }\nasync function postSheet(payload){\n  await fetch(normalizeSheetUrl(sheetUrl), {\n    method:'POST', mode:'no-cors',\n    headers:{'Content-Type':'text/plain;charset=utf-8'},\n    body: JSON.stringify(payload)\n  });\n}\n/* monta as linhas (uma por parcela) e grava de uma vez */\nasync function pushToSheet(recs){\n  const list = Array.isArray(recs) ? recs : [recs];\n  const rows = list.map(rec=>[\n    rec.num, rec.desc||'', rec.valor,\n    rec.tipo==='avista' ? 'À vista':'Parcelado',\n    rec.parcelaNum ? (rec.parcelaNum+'/'+rec.parcelas) : (rec.parcelas||''),\n    toBR(rec.venc),\n    rec.status==='pago' ? 'Pago':'Em aberto'\n  ]);\n  await postSheet({ action:'addMany', rows });\n}\n\nfunction setSheetMode(on){\n  sheetMode=on;\n  document.body.classList.toggle('sheet-mode', on);\n  document.body.classList.toggle('sheet-rw', on && canWrite);\n  document.getElementById('srcPill').style.display = on ? 'flex':'none';\n  document.getElementById('connectBtn').style.display = on ? 'none':'';\n}\n\nasync function syncSheet(opts={}){\n  if(!sheetUrl) return false;\n  const rb=document.getElementById('refreshBtn'); rb.classList.add('spin');\n  try{\n    canWrite = isAppsScript(normalizeSheetUrl(sheetUrl));\n    const rows = await fetchRows(sheetUrl);\n    data = rows; setSheetMode(true);\n    document.getElementById('srcUpd').textContent = 'atualizado ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});\n    renderAll();\n    if(opts.toast) toast(rows.length + ' pedido(s) carregado(s)');\n    return true;\n  }catch(e){\n    if(opts.fromModal) showConnErr(e); else toast('Falha ao ler a planilha');\n    return false;\n  }finally{ rb.classList.remove('spin'); }\n}\n\nfunction showConnErr(e){\n  const box=document.getElementById('connErr'), msg=document.getElementById('connErrMsg');\n  let m='Não consegui conectar. Confira se o link do app está completo (termina em /exec) e foi implantado com acesso “Qualquer pessoa”.';\n  const em=''+(e&&e.message||'');\n  if(em.includes('nao publicada')) m='A planilha respondeu, mas não parece estar publicada. Refaça o passo “Publicar na web” (ou use o link do app /exec).';\n  else if(em.includes('cabecalho')) m='Li os dados, mas não encontrei as colunas. Use o nosso modelo (Nº do Pedido, Valor, Vencimento…).';\n  else if(em.includes('timeout')||em.includes('script')||em.includes('app')) m='O app do Google não respondeu. Confira se você implantou como “App da web” com acesso “Qualquer pessoa” e copiou o link que termina em /exec.';\n  else if(em==='') m='Cole o link do app (ou da planilha publicada) antes de conectar.';\n  msg.textContent=m; box.classList.add('show');\n}\n\nfunction openConn(){\n  document.getElementById('connUrl').value = sheetUrl||'';\n  document.getElementById('connErr').classList.remove('show');\n  document.getElementById('disconnectBtn').style.display = sheetUrl ? 'block':'none';\n  document.getElementById('connScrim').classList.add('open');\n  setTimeout(()=>document.getElementById('connUrl').focus(), 60);\n}\nfunction closeConn(){ document.getElementById('connScrim').classList.remove('open'); }\n\ndocument.getElementById('connectBtn').onclick = openConn;\ndocument.getElementById('srcSettings').onclick = openConn;\ndocument.getElementById('connClose').onclick = closeConn;\ndocument.getElementById('connCancel').onclick = closeConn;\ndocument.getElementById('connScrim').addEventListener('click', e=>{ if(e.target.id==='connScrim') closeConn(); });\ndocument.getElementById('refreshBtn').onclick = ()=>syncSheet({toast:true});\ndocument.getElementById('connUrl').addEventListener('input', ()=>document.getElementById('connErr').classList.remove('show'));\ndocument.getElementById('disconnectBtn').onclick = ()=>{\n  sheetUrl=null; localStorage.removeItem(KEY_SRC); setSheetMode(false); data=load(); renderAll(); closeConn(); toast('Planilha desconectada');\n};\ndocument.getElementById('connSave').onclick = async ()=>{\n  const raw=document.getElementById('connUrl').value.trim();\n  if(!raw){ showConnErr({message:''}); return; }\n  const txt=document.getElementById('connSaveTxt'); txt.textContent='Conectando…';\n  const prev=sheetUrl; sheetUrl=raw;\n  const ok=await syncSheet({fromModal:true});\n  txt.textContent='Conectar';\n  if(ok){ localStorage.setItem(KEY_SRC, raw); closeConn(); toast('Planilha conectada'); }\n  else { sheetUrl=prev; }\n};\n\nsetInterval(()=>{ if(sheetMode && !document.hidden) syncSheet(); }, 90000);\n\n/* ---- init ---- */\nif(sheetUrl){ setSheetMode(true); syncSheet(); } else { renderAll(); }\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
